<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fun Kids Video Player</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Fredoka+One:wght@400&family=Nunito:wght@400;600;700;800&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Nunito', sans-serif;
      background: linear-gradient(45deg, #ff9a9e, #fecfef, #fecfef, #a8e6cf, #88d8c0);
      background-size: 400% 400%;
      animation: gradientShift 8s ease infinite;
      color: #333;
      min-height: 100vh;
      padding: 15px;
      position: relative;
      overflow-x: hidden;
    }

    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* Fun floating shapes */
    .floating-shapes {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: -1;
    }

    .shape {
      position: absolute;
      opacity: 0.1;
      animation: float 6s ease-in-out infinite;
    }

    .shape:nth-child(1) {
      top: 10%;
      left: 10%;
      animation-delay: 0s;
      font-size: 60px;
      animation-duration: 8s;
    }

    .shape:nth-child(2) {
      top: 20%;
      right: 15%;
      animation-delay: 2s;
      font-size: 80px;
      animation-duration: 10s;
    }

    .shape:nth-child(3) {
      bottom: 30%;
      left: 20%;
      animation-delay: 4s;
      font-size: 70px;
      animation-duration: 7s;
    }

    .shape:nth-child(4) {
      bottom: 15%;
      right: 10%;
      animation-delay: 6s;
      font-size: 90px;
      animation-duration: 9s;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-20px) rotate(180deg); }
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .header {
      text-align: center;
      margin-bottom: 30px;
      animation: bounceIn 1s ease;
    }

    @keyframes bounceIn {
      0% { transform: scale(0.3); opacity: 0; }
      50% { transform: scale(1.05); }
      70% { transform: scale(0.9); }
      100% { transform: scale(1); opacity: 1; }
    }

    .header h1 {
      font-family: 'Fredoka One', cursive;
      font-size: 3.5rem;
      background: linear-gradient(45deg, #ff6b6b, #4ecdc4, #45b7d1, #f093fb);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 10px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
      animation: wiggle 2s ease-in-out infinite;
    }

    @keyframes wiggle {
      0%, 100% { transform: rotate(0deg); }
      25% { transform: rotate(1deg); }
      75% { transform: rotate(-1deg); }
    }

    .header p {
      font-size: 1.2rem;
      color: #666;
      font-weight: 600;
    }

    .main-player {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 25px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
      margin-bottom: 30px;
      position: relative;
      border: 5px solid #fff;
      animation: slideInUp 0.8s ease;
    }

    @keyframes slideInUp {
      0% { transform: translateY(50px); opacity: 0; }
      100% { transform: translateY(0); opacity: 1; }
    }

    .video-container {
      position: relative;
      padding-bottom: 56.25%;
      height: 0;
    }

    .video-container iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
      border-radius: 20px 20px 0 0;
    }

    .video-info {
      padding: 25px;
      background: linear-gradient(135deg, #ffeaa7 0%, #fab1a0 100%);
      color: #2d3436;
    }

    .video-title {
      font-family: 'Nunito', sans-serif;
      font-size: 1.8rem;
      font-weight: 800;
      margin-bottom: 15px;
      color: #2d3436;
    }

    .video-stats {
      display: flex;
      align-items: center;
      gap: 20px;
      color: #636e72;
      font-size: 1rem;
      font-weight: 600;
    }

    .stat-badge {
      background: rgba(255,255,255,0.8);
      padding: 8px 15px;
      border-radius: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
      backdrop-filter: blur(10px);
    }

    .playlist {
      background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
      border-radius: 25px;
      padding: 30px;
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.1);
      border: 5px solid #fff;
      position: relative;
    }

    .playlist::before {
      content: '';
      position: absolute;
      top: -10px;
      left: -10px;
      right: -10px;
      bottom: -10px;
      background: linear-gradient(45deg, #ff9a9e, #fecfef, #a8e6cf);
      border-radius: 30px;
      z-index: -1;
    }

    .playlist-title {
      font-family: 'Fredoka One', cursive;
      font-size: 2rem;
      margin-bottom: 25px;
      color: #2d3436;
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .playlist-icon {
      width: 50px;
      height: 50px;
      background: linear-gradient(45deg, #fd79a8, #fdcb6e);
      border-radius: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
      animation: bounce 2s infinite;
    }

    @keyframes bounce {
      0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
      40% { transform: translateY(-10px); }
      60% { transform: translateY(-5px); }
    }

    .video-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
    }

    .video-card {
      background: linear-gradient(135deg, #74b9ff 0%, #0984e3 100%);
      border-radius: 20px;
      overflow: hidden;
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
      border: 4px solid #fff;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
      position: relative;
    }

    .video-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(45deg, transparent, rgba(255,255,255,0.1));
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
      z-index: 1;
    }

    .video-card:hover::before {
      opacity: 1;
    }

    .video-card:hover {
      transform: translateY(-15px) scale(1.02);
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.25);
      border-color: #fdcb6e;
    }

    .video-card.active {
      border-color: #e17055;
      background: linear-gradient(135deg, #fd79a8 0%, #e84393 100%);
      transform: translateY(-8px) scale(1.02);
    }

    .video-card.active::after {
      content: '▶️ PLAYING';
      position: absolute;
      top: 10px;
      left: 10px;
      background: rgba(255,255,255,0.95);
      color: #e84393;
      padding: 5px 12px;
      border-radius: 15px;
      font-size: 0.8rem;
      font-weight: 800;
      z-index: 2;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.05); }
      100% { transform: scale(1); }
    }

    .thumbnail-container {
      position: relative;
      padding-bottom: 56.25%;
      background: linear-gradient(45deg, #74b9ff, #0984e3);
      overflow: hidden;
    }

    .thumbnail {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.5s ease;
    }

    .video-card:hover .thumbnail {
      transform: scale(1.1) rotate(1deg);
    }

    .play-overlay {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: linear-gradient(45deg, #ff6b6b, #ff8e53);
      border-radius: 50%;
      width: 80px;
      height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 28px;
      box-shadow: 0 8px 25px rgba(255, 107, 107, 0.4);
      transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
      z-index: 2;
    }

    .video-card:hover .play-overlay {
      transform: translate(-50%, -50%) scale(1.2);
      background: linear-gradient(45deg, #00cec9, #55a3ff);
      box-shadow: 0 12px 35px rgba(0, 206, 201, 0.5);
    }

    .duration {
      position: absolute;
      bottom: 10px;
      right: 10px;
      background: linear-gradient(45deg, #2d3436, #636e72);
      color: #fff;
      padding: 6px 12px;
      border-radius: 15px;
      font-size: 0.8rem;
      font-weight: 700;
      z-index: 2;
      box-shadow: 0 3px 10px rgba(0,0,0,0.3);
    }

    .card-info {
      padding: 20px;
      background: linear-gradient(135deg, rgba(255,255,255,0.9), rgba(255,255,255,0.7));
    }

    .card-title {
      font-weight: 800;
      margin-bottom: 10px;
      font-size: 1.1rem;
      line-height: 1.3;
      color: #2d3436;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-description {
      color: #636e72;
      font-size: 0.9rem;
      line-height: 1.4;
      font-weight: 600;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: #2d3436;
    }

    .spinner {
      border: 4px solid rgba(116, 185, 255, 0.2);
      border-top: 4px solid #74b9ff;
      border-radius: 50%;
      width: 50px;
      height: 50px;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .loading-text {
      font-family: 'Fredoka One', cursive;
      font-size: 1.3rem;
      color: #74b9ff;
    }

    /* Fun buttons */
    .fun-button {
      background: linear-gradient(45deg, #fd79a8, #fdcb6e);
      border: none;
      padding: 12px 25px;
      border-radius: 25px;
      color: #fff;
      font-weight: 800;
      font-family: 'Nunito', sans-serif;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 5px 15px rgba(253, 121, 168, 0.3);
    }

    .fun-button:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 25px rgba(253, 121, 168, 0.5);
    }

    /* Mobile responsive */
    @media (max-width: 768px) {
      .video-grid {
        grid-template-columns: 1fr;
        gap: 15px;
      }
      
      .header h1 {
        font-size: 2.5rem;
      }
      
      .video-stats {
        flex-direction: column;
        align-items: flex-start;
        gap: 10px;
      }

      .playlist-title {
        font-size: 1.7rem;
      }

      .shape {
        display: none;
      }
    }

    /* Add some sparkle effects */
    .sparkle {
      position: absolute;
      width: 6px;
      height: 6px;
      background: #ffd700;
      border-radius: 50%;
      animation: sparkle 2s linear infinite;
    }

    @keyframes sparkle {
      0% { opacity: 0; transform: scale(0) rotate(0deg); }
      50% { opacity: 1; transform: scale(1) rotate(180deg); }
      100% { opacity: 0; transform: scale(0) rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="floating-shapes">
    <div class="shape">🌟</div>
    <div class="shape">🎈</div>
    <div class="shape">🦄</div>
    <div class="shape">🌈</div>
  </div>

  <div class="container">
    <div class="header">
      <h1>🎬 Fun Video Zone!</h1>
      <p>🎉 Watch amazing videos and have fun! 🎭</p>
    </div>

    <div class="main-player">
      <div class="video-container">
        <iframe 
          id="mainVideo"
          src="https://player.vimeo.com/video/1101763076?h=0&title=0&byline=0&portrait=0&autoplay=0"
          allow="autoplay; fullscreen; picture-in-picture"
          allowfullscreen>
        </iframe>
      </div>
      <div class="video-info">
        <div class="video-title" id="currentTitle">🎬 Loading awesome video...</div>
        <div class="video-stats">
          <div class="stat-badge">
            <span>👀</span>
            <span id="currentViews">Loading views...</span>
          </div>
          <div class="stat-badge">
            <span>📅</span>
            <span id="currentDate">Loading date...</span>
          </div>
        </div>
      </div>
    </div>

    <div class="playlist">
      <div class="playlist-title">
        <div class="playlist-icon">🎪</div>
        More Fun Videos!
      </div>
      
      <div id="loadingIndicator" class="loading">
        <div class="spinner"></div>
        <div class="loading-text">Loading magical videos... ✨</div>
      </div>
      
      <div class="video-grid" id="videoGrid" style="display: none;"></div>
    </div>
  </div>

  <script>
    // Kid-friendly video data with fun titles
    const videos = [
      {
        id: '1101763076',
        title: '🦋 Amazing Animals Adventure!',
        description: '🌿 Meet incredible animals from around the world in this super fun nature show!',
        duration: '12:34',
        views: '145K',
        date: '2 days ago'
      },
      {
        id: '76979871',
        title: '🎨 Colorful Art Magic!',
        description: '🖍️ Watch beautiful colors dance and create amazing pictures!',
        duration: '8:42',
        views: '89K',
        date: '1 week ago'
      },
      {
        id: '148003889',
        title: '🚀 Cool Science Fun!',
        description: '🧪 Discover awesome inventions and cool experiments!',
        duration: '15:20',
        views: '234K',
        date: '3 days ago'
      },
      {
        id: '259637265',
        title: '⭐ Magical Story Time!',
        description: '📚 A wonderful story with amazing characters and surprises!',
        duration: '6:18',
        views: '67K',
        date: '5 days ago'
      },
      {
        id: '336892869',
        title: '🗺️ World Adventure Trip!',
        description: '✈️ Travel to amazing places and see incredible sights!',
        duration: '18:45',
        views: '412K',
        date: '1 week ago'
      },
      {
        id: '148752315',
        title: '🎵 Happy Music Videos!',
        description: '🎤 Sing along with fun songs and catchy tunes!',
        duration: '22:10',
        views: '156K',
        date: '4 days ago'
      }
    ];

    let currentVideoIndex = 0;

    // Add sparkle effects randomly
    function createSparkle() {
      const sparkle = document.createElement('div');
      sparkle.className = 'sparkle';
      sparkle.style.left = Math.random() * 100 + '%';
      sparkle.style.top = Math.random() * 100 + '%';
      document.body.appendChild(sparkle);
      
      setTimeout(() => {
        sparkle.remove();
      }, 2000);
    }

    // Create sparkles periodically
    setInterval(createSparkle, 3000);

    // Function to get Vimeo thumbnail
    async function getVimeoThumbnail(videoId) {
      try {
        const response = await fetch(`https://vimeo.com/api/oembed.json?url=https://vimeo.com/${videoId}`);
        const data = await response.json();
        return data.thumbnail_url || `https://i.vimeocdn.com/video/${videoId}_295x166.jpg`;
      } catch (error) {
        return `https://i.vimeocdn.com/video/${videoId}_295x166.jpg`;
      }
    }

    // Function to create video card with kid-friendly design
    async function createVideoCard(video, index) {
      const thumbnail = await getVimeoThumbnail(video.id);
      
      const colors = [
        'linear-gradient(135deg, #74b9ff 0%, #0984e3 100%)',
        'linear-gradient(135deg, #fd79a8 0%, #e84393 100%)',
        'linear-gradient(135deg, #fdcb6e 0%, #e17055 100%)',
        'linear-gradient(135deg, #00cec9 0%, #55a3ff 100%)',
        'linear-gradient(135deg, #a29bfe 0%, #6c5ce7 100%)',
        'linear-gradient(135deg, #fd79a8 0%, #fdcb6e 100%)'
      ];
      
      return `
        <div class="video-card ${index === currentVideoIndex ? 'active' : ''}" 
             onclick="playVideo(${index})" data-index="${index}"
             style="background: ${colors[index % colors.length]};">
          <div class="thumbnail-container">
            <img src="${thumbnail}" alt="${video.title}" class="thumbnail">
            <div class="play-overlay">▶</div>
            <div class="duration">${video.duration}</div>
          </div>
          <div class="card-info">
            <div class="card-title">${video.title}</div>
            <div class="card-description">${video.description}</div>
          </div>
        </div>
      `;
    }

    // Function to load all videos
    async function loadVideos() {
      const videoGrid = document.getElementById('videoGrid');
      const loadingIndicator = document.getElementById('loadingIndicator');
      
      try {
        const videoCards = await Promise.all(
          videos.map((video, index) => createVideoCard(video, index))
        );
        
        videoGrid.innerHTML = videoCards.join('');
        loadingIndicator.style.display = 'none';
        videoGrid.style.display = 'grid';
        
        // Add entrance animation
        const cards = document.querySelectorAll('.video-card');
        cards.forEach((card, index) => {
          card.style.opacity = '0';
          card.style.transform = 'translateY(50px)';
          setTimeout(() => {
            card.style.transition = 'all 0.6s ease';
            card.style.opacity = '1';
            card.style.transform = 'translateY(0)';
          }, index * 100);
        });
        
        // Update current video info
        updateCurrentVideoInfo();
        
      } catch (error) {
        loadingIndicator.innerHTML = `
          <div style="color: #ff6b6b; font-family: 'Fredoka One', cursive; font-size: 1.2rem;">
            😅 Oops! Something went wrong. Let's try again! 🔄
          </div>
        `;
      }
    }

    // Function to play video with fun effects
    function playVideo(index) {
      currentVideoIndex = index;
      const video = videos[index];
      
      // Add fun click effect
      createSparkle();
      
      // Update main player
      document.getElementById('mainVideo').src = 
        `https://player.vimeo.com/video/${video.id}?h=0&title=0&byline=0&portrait=0&autoplay=1`;
      
      // Update active card with animation
      document.querySelectorAll('.video-card').forEach((card, i) => {
        card.classList.toggle('active', i === index);
        if (i === index) {
          card.style.animation = 'bounce 0.6s ease';
          setTimeout(() => {
            card.style.animation = '';
          }, 600);
        }
      });
      
      // Update video info
      updateCurrentVideoInfo();
      
      // Smooth scroll to top on mobile
      if (window.innerWidth <= 768) {
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }
    }

    // Function to update current video info
    function updateCurrentVideoInfo() {
      const video = videos[currentVideoIndex];
      document.getElementById('currentTitle').textContent = video.title;
      document.getElementById('currentViews').textContent = video.views + ' views';
      document.getElementById('currentDate').textContent = video.date;
    }

    // Initialize the player
    loadVideos();

    // Add keyboard navigation with fun sounds effect (visual feedback)
    document.addEventListener('keydown', (e) => {
      switch(e.key) {
        case 'ArrowUp':
          e.preventDefault();
          if (currentVideoIndex > 0) {
            playVideo(currentVideoIndex - 1);
          }
          break;
        case 'ArrowDown':
          e.preventDefault();
          if (currentVideoIndex < videos.length - 1) {
            playVideo(currentVideoIndex + 1);
          }
          break;
      }
    });

    // Add more interactive hover effects
    document.addEventListener('mouseover', (e) => {
      if (e.target.closest('.video-card')) {
        const card = e.target.closest('.video-card');
        card.style.transform = 'translateY(-15px) scale(1.02)';
        
        // Add random sparkle on hover
        if (Math.random() > 0.7) {
          createSparkle();
        }
      }
    });

    document.addEventListener('mouseout', (e) => {
      if (e.target.closest('.video-card') && !e.target.closest('.video-card').matches(':hover')) {
        const card = e.target.closest('.video-card');
        if (!card.classList.contains('active')) {
          card.style.transform = 'translateY(0) scale(1)';
        } else {
          card.style.transform = 'translateY(-8px) scale(1.02)';
        }
      }
    });

    // Add some fun interactions
    document.addEventListener('click', (e) => {
      if (e.target.closest('.video-card')) {
        // Create multiple sparkles on click
        for (let i = 0; i < 3; i++) {
          setTimeout(() => createSparkle(), i * 100);
        }
      }
    });
  </script>
</body>
</html>
